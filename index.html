<!DOCTYPE html>
<html>
<head>
  <title>Marketing Intelligence Updates</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dcdcdc;
    }

    .container {
      border: 2px solid green;
      margin: 20px;
      padding: 20px;
      background: #e6e6e6;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .box {
      border: 2px solid #3b73c4;
      background: #f5f5f5;
      height: 500px;
      overflow-y: auto;
      padding: 10px;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>MARKETING INTELLIGENCE UPDATES</h2>
  <div id="logBox" class="box"></div>
</div>

<script>
 const endpoint = "https://tpf.app.n8n.cloud/webhook/market-logs";
let lastText = "";

  
  async function fetchText() {
  try {

    const res = await fetch(endpoint);
    const text = await res.text();

    if (text !== lastText) {

      const box = document.getElementById("logBox");

      const line = document.createElement("div");

      line.textContent = text;

      box.appendChild(line);

      box.scrollTop = box.scrollHeight;

      lastText = text;
    }

  } catch (err) {

    console.error("Error fetching text:", err);

  }
}

// Poll every 2 seconds
setInterval(fetchText, 120000);
fetchText();
</script>
</body>
</html>
